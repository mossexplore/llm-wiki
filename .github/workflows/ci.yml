name: CI

on:
  push:
    branches: [main, chat]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: llm_wiki_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      LOG_WIKI_MYSQL_HOST: 127.0.0.1
      LOG_WIKI_MYSQL_PORT: "3306"
      LOG_WIKI_MYSQL_USER: root
      LOG_WIKI_MYSQL_PASSWORD: root
      LOG_WIKI_MYSQL_DATABASE: llm_wiki_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest)
        run: pytest -q

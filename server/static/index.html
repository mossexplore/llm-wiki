<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>log-wiki · 日志排查知识库</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <div id="app" class="page">
    <div class="wrap">
      <header class="top">
        <div class="brand">
          <div class="logo" aria-hidden="true"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"></path></svg></div>
          <div>
            <div class="kicker" style="color:var(--accent-deep)">LOG TRIAGE · KNOWLEDGE BASE</div>
            <h1>log-wiki · 日志排查知识库</h1>
          </div>
        </div>
      <div class="seg" aria-label="主模式">
        <button id="tab-ingest" class="on" type="button">写入知识</button>
        <button id="tab-list" type="button">知识列表</button>
        <button id="tab-query" type="button">检索知识</button>
        <button id="tab-graph" type="button">知识图谱</button>
      </div>
      </header>
      <div class="rule"></div>
      <main id="root"></main>
      <div class="footer">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20Z"></path><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
        AI 可能产生不准确的信息,关键操作请人工核实;signatures 保持报错原文。
      </div>
    </div>
    <div id="toast" class="toast"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"></path></svg><span></span></div>
  </div>

  <script src="/static/js/core.js"></script>
  <script src="/static/js/ingest.js"></script>
  <script src="/static/js/ingest-batch.js"></script>
  <script src="/static/js/list.js"></script>
  <script src="/static/js/query.js"></script>
  <script src="/static/js/graph.js"></script>
  <script src="/static/js/boot.js"></script>
</body>
</html>

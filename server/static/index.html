<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>log-wiki · 日志排查知识库</title>
  <style>
    :root {
      --accent-h: 205;
      --accent: oklch(0.58 0.15 var(--accent-h));
      --accent-bright: oklch(0.50 0.16 var(--accent-h));
      --accent-deep: oklch(0.45 0.15 var(--accent-h));
      --accent-soft: oklch(0.74 0.13 var(--accent-h) / 0.13);
      --accent-line: oklch(0.74 0.13 var(--accent-h) / 0.32);
      --accent-glow: oklch(0.74 0.13 var(--accent-h) / 0.20);
      --bg-app: #eef1f6;
      --surface-1: #ffffff;
      --surface-2: #ffffff;
      --surface-3: #f4f7fb;
      --surface-inset: #eef2f7;
      --field: #ffffff;
      --field-focus: #ffffff;
      --line: rgba(15, 25, 45, 0.10);
      --line-strong: rgba(15, 25, 45, 0.16);
      --line-faint: rgba(15, 25, 45, 0.06);
      --text: #141a25;
      --text-dim: #3c4655;
      --text-mute: #6b7689;
      --text-faint: #97a1b2;
      --on-accent: #ffffff;
      --success: oklch(0.62 0.14 155);
      --warning: oklch(0.66 0.13 80);
      --danger: oklch(0.62 0.16 18);
      --success-soft: oklch(0.78 0.14 155 / 0.14);
      --warning-soft: oklch(0.82 0.13 80 / 0.16);
      --danger-soft: oklch(0.70 0.16 18 / 0.14);
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Consolas, monospace;
      --r-sm: 9px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-full: 999px;
      --sh-sm: 0 1px 2px rgba(20, 30, 50, 0.08);
      --sh-pop: 0 18px 48px -14px rgba(20, 30, 50, 0.26);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg-app);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    button, input, textarea { font: inherit; color: inherit; }
    button { border: 0; background: none; cursor: pointer; }
    svg { flex: none; }

    .page { min-height: 100vh; padding: 36px 32px 64px; }
    .wrap { max-width: 1180px; margin: 0 auto; }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }
    .brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .logo {
      width: 44px;
      height: 44px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      background: linear-gradient(150deg, oklch(0.72 0.12 var(--accent-h)), var(--accent-deep));
      color: var(--on-accent);
      box-shadow: 0 10px 24px -8px var(--accent-glow);
    }
    h1 { margin: 2px 0 0; font-size: 22px; font-weight: 800; line-height: 1.25; }
    h3 { margin: 3px 0 0; font-size: 15px; font-weight: 650; line-height: 1.35; }
    .rule { height: 1px; background: var(--line); margin-bottom: 26px; }
    .grid { display: grid; grid-template-columns: 244px 1fr; gap: 22px; align-items: start; }
    .main { display: grid; gap: 16px; min-width: 0; }

    .kicker {
      font-family: var(--mono);
      font-size: 10.5px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--text-mute);
      white-space: nowrap;
    }
    .mono { font-family: var(--mono); }
    .muted { color: var(--text-mute); }
    .dim { color: var(--text-dim); }

    .card {
      background: var(--surface-1);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      box-shadow: var(--sh-sm);
    }
    .rail { padding: 20px 18px; position: sticky; top: 24px; }
    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }
    .card-pad { padding: 18px; }
    .seg {
      display: inline-flex;
      gap: 3px;
      padding: 3px;
      background: var(--surface-inset);
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
    }
    .seg button {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-mute);
      white-space: nowrap;
    }
    .seg button:hover { color: var(--text-dim); }
    .seg button.on { background: var(--surface-2); color: var(--text); box-shadow: var(--sh-sm); }

    .badge, .lc {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: var(--r-full);
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--text-dim);
      white-space: nowrap;
    }
    .badge.ok, .lc.published { color: var(--success); background: var(--success-soft); border-color: transparent; }
    .badge.warn, .lc.review { color: var(--warning); background: var(--warning-soft); border-color: transparent; }
    .badge.info { color: var(--accent-bright); background: var(--accent-soft); border-color: transparent; }
    .badge.bad { color: var(--danger); background: var(--danger-soft); border-color: transparent; }
    .dot { width: 6px; height: 6px; border-radius: var(--r-full); background: currentColor; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 36px;
      padding: 0 14px;
      border-radius: var(--r-sm);
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--text-dim);
      transition: 0.15s var(--ease);
      white-space: nowrap;
    }
    .btn:hover { color: var(--text); border-color: var(--line-strong); background: var(--surface-3); }
    .btn.primary { background: var(--accent); color: var(--on-accent); border-color: transparent; box-shadow: 0 8px 20px -8px var(--accent-glow); }
    .btn.primary:hover { background: var(--accent-bright); color: var(--on-accent); }
    .btn.ghost { background: transparent; }
    .btn.sm { min-height: 30px; padding: 0 11px; font-size: 12px; }
    .btn.icon { width: 36px; padding: 0; flex: none; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .field {
      width: 100%;
      height: 38px;
      padding: 0 12px;
      border-radius: var(--r-sm);
      background: var(--field);
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 13px;
      transition: 0.15s;
    }
    textarea.field { height: auto; padding: 10px 12px; resize: vertical; line-height: 1.6; }
    .field::placeholder { color: var(--text-faint); }
    .field:focus { outline: none; border-color: var(--accent-line); background: var(--field-focus); box-shadow: 0 0 0 3px var(--accent-soft); }
    .lbl { display: grid; gap: 6px; }
    .lbl > span { font-size: 11.5px; font-weight: 600; color: var(--text-mute); }

    .step { display: flex; gap: 13px; }
    .step.click { cursor: pointer; }
    .step-mark { display: flex; flex-direction: column; align-items: center; }
    .step-dot {
      width: 28px;
      height: 28px;
      border-radius: var(--r-full);
      display: grid;
      place-items: center;
      background: var(--surface-3);
      border: 1px solid var(--line);
      color: var(--text-mute);
      font-family: var(--mono);
      font-weight: 700;
      font-size: 12px;
    }
    .step.active .step-dot {
      background: var(--accent-soft);
      border: 2px solid var(--accent);
      color: var(--accent-deep);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }
    .step.done .step-dot { background: var(--accent); color: var(--on-accent); border-color: transparent; }
    .step-line { width: 2px; flex: 1; min-height: 20px; margin: 5px 0; background: var(--line); }
    .step.done .step-line { background: var(--accent); }
    .step-copy { padding-bottom: 18px; }
    .step-label { font-size: 13.5px; font-weight: 650; color: var(--text-mute); }
    .step.active .step-label { color: var(--accent-deep); font-weight: 700; }
    .step.done .step-label { color: var(--text); }

    .codebox {
      margin: 0;
      min-height: 120px;
      max-height: 340px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--surface-inset);
      border: 1px solid var(--line-faint);
      border-radius: var(--r-md);
      padding: 14px 16px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.62;
      color: var(--text-dim);
    }
    .result-block {
      border-left: 3px solid var(--success);
      background: var(--success-soft);
      border-radius: 0 var(--r-md) var(--r-md) 0;
      padding: 13px 16px;
    }
    .result-block.warn { border-left-color: var(--warning); background: var(--warning-soft); }
    .empty { display: grid; place-items: center; gap: 8px; padding: 36px 20px; text-align: center; color: var(--text-mute); }
    .toast {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      z-index: 80;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      border-radius: var(--r-md);
      background: var(--surface-1);
      border: 1px solid var(--line-strong);
      box-shadow: var(--sh-pop);
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: 0.25s var(--ease);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .spin { animation: spin 0.9s linear infinite; }
    .pulse { animation: pulse 1.1s infinite; }
    .caret { display: inline-block; width: 7px; height: 14px; margin-left: 2px; background: var(--accent); animation: blink 1s step-end infinite; vertical-align: -2px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 50% { opacity: 0.35; } }
    @keyframes blink { 50% { opacity: 0; } }

    .footer {
      margin-top: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-faint);
      font-size: 11.5px;
      text-align: center;
    }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .mobile-only { display: none; }

    @media (max-width: 840px) {
      .page { padding: 24px 16px 44px; }
      .grid { grid-template-columns: 1fr; }
      .rail { position: static; }
      .two { grid-template-columns: 1fr; }
      .card-head { align-items: flex-start; }
      .desktop-only { display: none; }
      .mobile-only { display: block; }
    }
  </style>
</head>
<body>
  <div id="app" class="page">
    <div class="wrap">
      <header class="top">
        <div class="brand">
          <div class="logo" aria-hidden="true"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"></path></svg></div>
          <div>
            <div class="kicker" style="color:var(--accent-deep)">LOG TRIAGE · KNOWLEDGE BASE</div>
            <h1>log-wiki · 日志排查知识库</h1>
          </div>
        </div>
        <div class="seg" aria-label="主模式">
          <button id="tab-ingest" class="on" type="button">写入知识</button>
          <button id="tab-query" type="button">检索知识</button>
        </div>
      </header>
      <div class="rule"></div>
      <main id="root"></main>
      <div class="footer">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20Z"></path><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
        AI 可能产生不准确的信息,关键操作请人工核实;signatures 保持报错原文。
      </div>
    </div>
    <div id="toast" class="toast"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"></path></svg><span></span></div>
  </div>

  <script>
    const SAMPLE_RAW_FALLBACK = '大促高峰 order-service 一批接口疯狂 500,日志一直刷 HikariPool-1 - Connection is not available, request timed out after 30007ms。DB CPU 不高,但活跃连接数顶满 maximumPoolSize 设为 20。排查发现慢查询 getOrderDetail 平均 4.2s 长时间占用连接,池一被占满后续请求等待 30s 超时即报错。最终给 getOrderDetail 涉及字段加复合索引,查询降到 60ms,并把 maximumPoolSize 调到 40、加上 leakDetectionThreshold 连接泄漏检测,大促期间未再复现。';
    const SAMPLE_CASE_FALLBACK = {
      title: 'HikariPool 连接池耗尽致接口批量 500',
      category: '数据库 / 连接池',
      signatures: ['HikariPool-1 - Connection is not available, request timed out'],
      components: ['order-service', 'HikariCP', 'MySQL'],
      background: '大促高峰期 order-service 接口批量返回 500,DB CPU 不高但活跃连接顶满 maximumPoolSize 设为 20。',
      diagnosis: '慢查询 getOrderDetail 平均 4.2s 长时间占用连接,连接池耗尽后续请求等待 30s 超时,HikariCP 抛 Connection is not available。',
      solution: '为 getOrderDetail 涉及字段加复合索引,查询从 4.2s 降至 60ms;maximumPoolSize 由 20 调至 40,并启用 HikariCP leakDetectionThreshold 连接泄漏检测,大促期间未再出现连接池耗尽。'
    };

    const state = {
      mode: 'ingest',
      step: 1,
      maxStep: 1,
      rawInput: '',
      streamText: '',
      previewing: false,
      parseErr: '',
      draft: null,
      committing: false,
      committed: null,
      logText: '',
      querying: false,
      result: null,
      stats: null,
      sample: { raw: SAMPLE_RAW_FALLBACK, case: SAMPLE_CASE_FALLBACK }
    };

    const root = document.getElementById('root');
    const toastEl = document.getElementById('toast');
    const tabIngest = document.getElementById('tab-ingest');
    const tabQuery = document.getElementById('tab-query');

    function iconBook() { return '<svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"></path></svg>'; }
    function iconCheck() { return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"></path></svg>'; }
    function iconInfo() { return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20Z"></path><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>'; }
    function iconSearch() { return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"></path><path d="M21 21l-4.35-4.35"></path></svg>'; }
    function iconPlus() { return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>'; }
    function iconBack() { return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"></path></svg>'; }
    function iconTrash() { return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path></svg>'; }
    function iconFile() { return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><path d="M14 2v6h6"></path></svg>'; }
    function iconSpark() { return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6m0 8v6"></path><path d="M2 12h6m8 0h6"></path><path d="M5 5l4 4m6 6 4 4"></path><path d="M19 5l-4 4m-6 6-4 4"></path></svg>'; }
    function iconSpin() { return '<svg class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.2-8.5"></path></svg>'; }

    function escapeHtml(v) {
      return String(v == null ? '' : v)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function showToast(msg) {
      clearTimeout(showToast.timer);
      toastEl.querySelector('span').textContent = msg;
      toastEl.classList.add('show');
      showToast.timer = setTimeout(() => toastEl.classList.remove('show'), 2800);
    }

    function noBackend(status) {
      return [404, 405, 501, 502, 503, 504].includes(status);
    }

    function slug(s) {
      return (s || 'case').toLowerCase().replace(/[^a-z0-9\u4e00-\u9fa5]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 40) || 'case';
    }

    function newRequestId() {
      if (window.crypto && crypto.randomUUID) return crypto.randomUUID().slice(0, 12);
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    }

    function clipText(text, size = 500) {
      const s = String(text || '');
      if (s.length <= size * 2) return s;
      return s.slice(0, size) + '\\n...<snip>...\\n' + s.slice(-size);
    }

    function normalizeJsonText(text) {
      let txt = String(text || '').trim();
      txt = txt.replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/i, '').trim();
      if (!txt.startsWith('{')) {
        const first = txt.indexOf('{');
        const last = txt.lastIndexOf('}');
        if (first !== -1 && last > first) txt = txt.slice(first, last + 1).trim();
      }
      return txt;
    }

    function logPreviewFailure(info) {
      console.error('[log-wiki] ingest preview parse failed', {
        requestId: info.requestId,
        httpStatus: info.httpStatus,
        rawLength: info.rawLength,
        streamLength: info.streamText.length,
        normalizedLength: info.normalizedText.length,
        message: info.error && info.error.message || String(info.error),
        streamSample: clipText(info.streamText),
        normalizedSample: clipText(info.normalizedText)
      });
    }

    function toDraft(o, raw) {
      return {
        title: o.title || '',
        category: o.category || '未分类',
        signatures: o.signatures && o.signatures.length ? o.signatures.slice() : [''],
        components: o.components && o.components.length ? o.components.slice() : [''],
        background: o.background || '',
        diagnosis: o.diagnosis || '',
        solution: o.solution || '',
        ident: '',
        raw
      };
    }

    function setMode(mode) {
      state.mode = mode;
      tabIngest.classList.toggle('on', mode === 'ingest');
      tabQuery.classList.toggle('on', mode === 'query');
      render();
    }

    function setStep(step) {
      if (step <= state.maxStep) {
        state.step = step;
        render();
      }
    }

    function goToStep(step) {
      state.step = step;
      state.maxStep = Math.max(state.maxStep, step);
    }

    async function refreshMeta() {
      try {
        const [statsResp, sampleResp] = await Promise.all([
          fetch('/api/kb/stats'),
          fetch('/api/examples/ingest')
        ]);
        if (statsResp.ok) state.stats = await statsResp.json();
        if (sampleResp.ok) state.sample = await sampleResp.json();
      } catch (e) {}
      render();
    }

    async function loadSample() {
      if (!state.sample.raw) await refreshMeta();
      state.rawInput = state.sample.raw || SAMPLE_RAW_FALLBACK;
      render();
      showToast('已载入示例记录');
    }

    async function doPreview() {
      const raw = state.rawInput;
      if (!raw.trim()) { showToast('请先粘贴原始排查记录'); return; }
      Object.assign(state, { step: 2, maxStep: Math.max(state.maxStep, 2), previewing: true, streamText: '', parseErr: '', draft: null, committed: null });
      render();
      const requestId = newRequestId();
      let httpStatus = null;
      let normalizedText = '';
      try {
        const resp = await fetch('/api/ingest/preview', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Request-ID': requestId },
          body: JSON.stringify({ raw })
        });
        httpStatus = resp.status;
        const responseRequestId = resp.headers.get('X-Request-ID') || requestId;
        if (!resp.ok) {
          if (noBackend(resp.status)) return demoPreview(raw);
          let detail = '';
          try { detail = (await resp.json()).detail; } catch (e) {}
          throw new Error(`[request_id=${responseRequestId}] ${detail || 'HTTP ' + resp.status}`);
        }
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let acc = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          acc += decoder.decode(value, { stream: true });
          state.streamText = acc;
          render();
        }
        if (acc.includes('[ERROR]')) throw new Error(acc);
        normalizedText = normalizeJsonText(acc);
        state.draft = toDraft(JSON.parse(normalizedText), raw);
        goToStep(3);
        state.previewing = false;
        console.info('[log-wiki] ingest preview parsed', {
          requestId: responseRequestId,
          rawLength: raw.length,
          streamLength: acc.length,
          normalizedLength: normalizedText.length
        });
        render();
        showToast('解析完成,请复核后确认入库');
      } catch (e) {
        logPreviewFailure({
          requestId,
          httpStatus,
          rawLength: raw.length,
          streamText: state.streamText,
          normalizedText,
          error: e
        });
        state.parseErr = `request_id=${requestId}\n${String(e && e.message || e)}`;
        state.previewing = false;
        render();
        showToast('解析失败,详见下方');
      }
    }

    async function demoPreview(raw) {
      const obj = state.sample.case || SAMPLE_CASE_FALLBACK;
      const json = JSON.stringify(obj, null, 2);
      for (let k = 1; k <= 6; k++) {
        await new Promise(r => setTimeout(r, 90));
        state.streamText = json.slice(0, Math.round(json.length * k / 6));
        render();
      }
      state.streamText = json;
      state.draft = toDraft(obj, raw);
      goToStep(3);
      state.previewing = false;
      render();
      showToast('后端未连接 · 已载入演示数据');
    }

    async function commit() {
      const d = state.draft;
      if (!d) return;
      const payload = {
        raw: d.raw,
        title: d.title,
        category: d.category,
        signatures: d.signatures.filter(s => s && s.trim()),
        components: d.components.filter(c => c && c.trim()),
        background: d.background,
        diagnosis: d.diagnosis,
        solution: d.solution,
        ident: d.ident || null
      };
      if (!payload.title.trim()) { showToast('标题不能为空'); return; }
      if (!payload.signatures.length) { showToast('至少保留一条 signature'); return; }
      state.committing = true;
      render();
      try {
        const r = await fetch('/api/ingest/commit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (noBackend(r.status)) {
          const stamp = payload.ident || String(Date.now());
          state.committed = { case_file: 'wiki/cases/' + slug(payload.title) + '.md', raw_file: 'raw/sources/' + stamp + '.md', demo: true };
          goToStep(4);
          state.committing = false;
          render();
          showToast('后端未连接 · 已演示入库结果');
          return;
        }
        const data = await r.json();
        if (!r.ok) throw new Error(data.detail || '入库失败');
        state.committed = data;
        goToStep(4);
        state.committing = false;
        render();
        refreshMeta();
        showToast('已真正写入本地知识库');
      } catch (e) {
        state.committing = false;
        render();
        showToast(String(e && e.message || e));
      }
    }

    async function runQuery() {
      if (!state.logText.trim()) { showToast('请输入报错信息'); return; }
      state.querying = true;
      state.result = null;
      render();
      try {
        const r = await fetch('/api/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ log: state.logText })
        });
        if (noBackend(r.status)) return demoQuery();
        const data = await r.json();
        if (!r.ok) throw new Error(data.detail || '检索失败');
        state.result = data;
        state.querying = false;
        render();
      } catch (e) {
        state.querying = false;
        render();
        showToast(String(e && e.message || e));
      }
    }

    function demoQuery() {
      const log = state.logText.toLowerCase();
      if (log.includes('hikari') || log.includes('connection is not available')) {
        state.result = { mode: 'exact', hits: [{ title: SAMPLE_CASE_FALLBACK.title, status: 'verified', file: 'wiki/cases/hikari-pool-exhausted.md', matched: ['HikariPool-1 - Connection is not available'], solution: SAMPLE_CASE_FALLBACK.solution }] };
      } else if (log.includes('oom') || log.includes('outofmemory') || log.includes('timeout') || log.includes('timed out')) {
        state.result = { mode: 'fuzzy', hits: [{ title: 'JVM Metaspace OOM', score: 0.42, file: 'wiki/cases/jvm-metaspace-oom.md' }, { title: 'Kafka 消费组 Rebalance 风暴', score: 0.31, file: 'wiki/cases/kafka-rebalance.md' }] };
      } else {
        state.result = { mode: 'none', hits: [] };
      }
      state.querying = false;
      render();
      showToast('后端未连接 · 已演示检索结果');
    }

    function resetIngest() {
      Object.assign(state, { step: 1, maxStep: 1, rawInput: '', streamText: '', parseErr: '', draft: null, committed: null });
      render();
    }

    function updateDraft(key, value) {
      state.draft[key] = value;
    }

    function updateList(key, index, value) {
      state.draft[key][index] = value;
    }

    function addList(key) {
      state.draft[key].push('');
      render();
    }

    function removeList(key, index) {
      state.draft[key].splice(index, 1);
      if (!state.draft[key].length) state.draft[key].push('');
      render();
    }

    function stepRows() {
      const defs = [
        { n: 1, label: '粘贴原文', meta: state.rawInput ? state.rawInput.length + ' 字 · 已读取' : '等待粘贴' },
        { n: 2, label: '模型抽取', meta: state.previewing ? '流式生成中…' : (state.parseErr ? '解析失败' : (state.streamText ? 'JSON · 已完成' : '等待解析')) },
        { n: 3, label: '人工复核', meta: state.draft ? '可编辑核对' : '等待抽取' },
        { n: 4, label: '确认入库', meta: state.committed ? '已写入' : '待入库' }
      ];
      return defs.map((d, idx) => {
        const cls = ['step'];
        if (d.n < state.step) cls.push('done', 'click');
        if (d.n === state.step) cls.push('active', 'click');
        if (d.n > state.step && d.n <= state.maxStep) cls.push('click');
        return `
          <div class="${cls.join(' ')}" data-step="${d.n}">
            <div class="step-mark">
              <div class="step-dot">${d.n < state.step ? iconCheck() : d.n}</div>
              ${idx < defs.length - 1 ? '<div class="step-line"></div>' : ''}
            </div>
            <div class="step-copy">
              <div class="step-label">${escapeHtml(d.label)}</div>
              <div class="mono muted" style="font-size:10.5px;margin-top:2px">${escapeHtml(d.meta)}</div>
            </div>
          </div>`;
      }).join('');
    }

    function statsHtml() {
      const s = state.stats;
      if (!s) return '<div class="mono muted" style="font-size:11px;margin-top:12px">统计加载中...</div>';
      return `
        <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--line-faint);display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div><div class="kicker">CASES</div><strong>${s.cases}</strong></div>
          <div><div class="kicker">SIGN</div><strong>${s.signatures}</strong></div>
          <div><div class="kicker">VERIFIED</div><strong>${s.verified}</strong></div>
          <div><div class="kicker">DRAFT</div><strong>${s.drafts}</strong></div>
        </div>`;
    }

    function renderRail() {
      if (state.mode === 'query') {
        return `

            <div class="kicker" style="margin-bottom:14px">MATCH MODES</div>

              ${modeNote('var(--text-faint)', '暂无案例', '勿编造方案;排查后到写入页入库。')}
            </div>
            ${statsHtml()}
          </aside>`;
      }
      return `
        <aside class="card rail">
          <div class="kicker" style="margin-bottom:16px">INGEST PIPELINE</div>
          <div>${stepRows()}</div>
          <div style="margin-top:4px;padding-top:16px;border-top:1px solid var(--line-faint);display:flex;gap:7px;align-items:flex-start">
            <span style="width:8px;height:8px;border-radius:999px;background:var(--warning);margin-top:5px;flex:none"></span>
            <span style="font-size:11.5px;color:var(--text-mute);line-height:1.5">signatures 请保持报错原文,勿改写或脱敏。</span>
          </div>
          ${statsHtml()}
        </aside>`;
    }

    function modeNote(color, title, text) {
      return `<div style="display:flex;gap:10px"><span style="width:8px;height:8px;border-radius:999px;background:${color};flex:none;margin-top:5px"></span><div><div style="font-size:13px;font-weight:650;color:var(--text)">${title}</div><div class="muted" style="font-size:11.5px;line-height:1.5;margin-top:2px">${text}</div></div></div>`;
    }

    function renderIngestMain() {
      if (state.step === 1) {
        return `
          <section class="card">
            <div class="card-head"><div><div class="kicker">STEP 01 · PASTE</div><h3>粘贴原始排查记录</h3></div><span class="badge mono">不落库</span></div>

              <textarea id="rawInput" class="field mono" spellcheck="false" placeholder="例:大促高峰 order-service 一批接口疯狂 500,日志一直刷 HikariPool-1 - Connection is not available, request timed out after 30007ms……" style="height:208px;font-size:12.5px;line-height:1.62">${escapeHtml(state.rawInput)}</textarea>
              <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:13px;flex-wrap:wrap">
                <button class="btn sm ghost" id="loadSample" type="button">${iconFile()}载入示例</button>
                <div style="display:flex;align-items:center;gap:13px">
                  <span class="mono muted" style="font-size:11px">${state.rawInput ? state.rawInput.length + ' 字' : ''}</span>

                </div>

            </div>

      if (state.step === 2) {
        return `
          <section class="card">
            <div class="card-head">
              <div><div class="kicker">STEP 02 · MODEL EXTRACTION</div><h3>模型流式抽取</h3></div>
              ${state.previewing ? '<span class="badge info"><span class="dot pulse"></span>生成中</span>' : '<span class="badge ok"><span class="dot"></span>已完成</span>'}
            </div>

              ${state.parseErr ? `
                <div class="result-block warn" style="border-left-color:var(--danger);background:var(--danger-soft);margin-top:13px">

                  <div class="mono" style="font-size:11.5px;color:var(--text-dim);margin-top:6px;white-space:pre-wrap;word-break:break-word">${escapeHtml(state.parseErr)}</div>
                </div>
                <div style="display:flex;gap:10px;margin-top:13px;flex-wrap:wrap">
                  <button class="btn" id="backToPaste" type="button">${iconBack()}返回修改原文</button>
                  <button class="btn primary" id="retryPreview" type="button">重试</button>
                </div>` : ''}
            </div>
          </section>`;

      if (state.step === 3) return renderReview();
      return renderDone();
    }

    function renderReview() {
      const d = state.draft || {};
      return `
        <section class="card">
          <div class="card-head"><div><div class="kicker">STEP 03 · HUMAN REVIEW</div><h3>复核抽取结果,确认无误后入库</h3></div><span class="badge warn">待确认</span></div>
          <div class="card-pad" style="display:grid;gap:14px">
            <label class="lbl"><span>标题</span><input id="title" class="field" value="${escapeHtml(d.title || '')}"></label>
            <div class="two">
              <label class="lbl"><span>类别</span><input id="category" class="field" value="${escapeHtml(d.category || '')}"></label>
              <label class="lbl"><span>工单号</span><input id="ident" class="field mono" value="${escapeHtml(d.ident || '')}" placeholder="可选,留空用时间戳"></label>
            </div>
            <div class="lbl">
              <span>signatures <span class="mono" style="color:var(--text-faint);font-weight:400;text-transform:none;letter-spacing:0">报错原文 · 勿改写</span></span>
              <div style="display:grid;gap:8px">
                ${(d.signatures || ['']).map((v, i) => `
                  <div style="display:flex;gap:8px">
                    <input class="field mono sig" data-index="${i}" style="font-size:12px" value="${escapeHtml(v)}" placeholder="报错原文 / 异常类全名 / 错误码">
                    <button class="btn icon del-sig" data-index="${i}" type="button" title="删除">${iconTrash()}</button>
                  </div>`).join('')}
              </div>
              <button class="btn sm" id="addSig" type="button" style="justify-self:start;margin-top:2px">${iconPlus()}添加 signature</button>
            </div>
            <div class="lbl">
              <span>组件</span>
              <div class="two" style="gap:8px">
                ${(d.components || ['']).map((v, i) => `
                  <div style="display:flex;gap:6px">
                    <input class="field mono comp" data-index="${i}" style="font-size:12px" value="${escapeHtml(v)}" placeholder="服务 / 组件名">
                    <button class="btn icon del-comp" data-index="${i}" type="button" title="删除">${iconTrash()}</button>
                  </div>`).join('')}
              </div>
              <button class="btn sm" id="addComp" type="button" style="justify-self:start;margin-top:2px">${iconPlus()}添加组件</button>
            </div>
            <div class="two">
              <label class="lbl"><span>问题背景</span><textarea id="background" class="field" style="height:96px">${escapeHtml(d.background || '')}</textarea></label>
              <label class="lbl"><span>定位过程</span><textarea id="diagnosis" class="field" style="height:96px">${escapeHtml(d.diagnosis || '')}</textarea></label>
            </div>
            <label class="lbl"><span>解决方案</span><textarea id="solution" class="field" style="height:88px">${escapeHtml(d.solution || '')}</textarea></label>
            <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding-top:14px;border-top:1px solid var(--line-faint);flex-wrap:wrap">
              <button class="btn" id="backToPaste" type="button">${iconBack()}上一步:原文</button>
              <button class="btn primary" id="commit" type="button" ${state.committing ? 'disabled' : ''}>${state.committing ? iconSpin() : iconCheck()}确认入库</button>
            </div>
          </div>
        </section>`;
    }

    function renderDone() {
      const c = state.committed || {};
      return `
        <section class="card">
          <div class="card-pad" style="display:grid;gap:18px;justify-items:center;text-align:center;padding:38px 24px">
            <div style="width:56px;height:56px;border-radius:999px;display:grid;place-items:center;background:var(--success-soft);color:var(--success)">${iconCheck()}</div>
            <div>
              <div style="font-size:18px;font-weight:700">已写入本地知识库</div>
              <div class="muted" style="font-size:12.5px;margin-top:5px">结构化案例与原文存档均已落库,可立即被检索命中。</div>
            </div>
            <div style="display:grid;gap:8px;width:100%;max-width:440px;text-align:left">
              <div style="display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r-md);background:var(--surface-inset);border:1px solid var(--line-faint)"><span class="kicker">CASE</span><code class="mono" style="font-size:12px;color:var(--accent-deep);word-break:break-all">${escapeHtml(c.case_file || '')}</code></div>
              <div style="display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r-md);background:var(--surface-inset);border:1px solid var(--line-faint)"><span class="kicker">RAW</span><code class="mono" style="font-size:12px;color:var(--text-mute);word-break:break-all">${escapeHtml(c.raw_file || '')}</code></div>
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
              <button class="btn primary" id="resetIngest" type="button">${iconPlus()}再写入一条</button>
              <button class="btn" id="goQuery" type="button">${iconSearch()}去检索</button>
            </div>
          </div>
        </section>`;
    }

    function renderQueryMain() {
      const r = state.result;
      return `
        <section class="card">
          <div class="card-head"><div><div class="kicker">QUERY · PASTE LOG</div><h3>粘一段日志报错检索相似案例</h3></div><span class="badge mono">噪声无所谓</span></div>
          <div class="card-pad">
            <textarea id="logText" class="field mono" spellcheck="false" placeholder="例:2026-06-13 15:10:33 ERROR HikariPool-1 - Connection is not available, request timed out after 30007ms" style="height:122px;font-size:12.5px;line-height:1.6">${escapeHtml(state.logText)}</textarea>
            <button class="btn primary" id="runQuery" type="button" style="margin-top:13px" ${state.querying ? 'disabled' : ''}>${state.querying ? iconSpin() : iconSearch()}检索</button>
          </div>
        </section>
        ${r ? renderResults(r) : ''}`;
    }

    function renderResults(r) {
      if (r.mode === 'exact') {
        return `
          <section class="card">
            <div class="card-head"><div><div class="kicker">RESULT · EXACT MATCH</div><h3>精确命中 ${r.hits.length} 个案例</h3></div><span class="badge ok">${iconCheck()}EXACT</span></div>
            <div class="card-pad" style="display:grid;gap:12px">
              ${r.hits.map(h => `
                <div class="result-block">
                  <div style="display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start">
                    <strong style="font-size:14.5px;line-height:1.45">${escapeHtml(h.title)}</strong>
                    <span class="lc ${h.status === 'verified' ? 'published' : 'review'}"><span class="dot"></span>${escapeHtml(h.status)}</span>
                  </div>
                  <div class="mono muted" style="font-size:11.5px;margin-top:8px;line-height:1.55">${escapeHtml(h.file)} · 命中:${escapeHtml((h.matched || []).join('；'))}</div>
                  ${h.note ? `<div class="muted" style="font-size:11.5px;margin-top:5px">${escapeHtml(h.note)}</div>` : ''}
                  <div class="kicker" style="margin-top:13px;margin-bottom:6px">SOLUTION</div>
                  <div style="font-size:13px;color:var(--text-dim);line-height:1.72;white-space:pre-wrap">${escapeHtml(h.solution)}</div>
                </div>`).join('')}
            </div>
          </section>`;
      }
      if (r.mode === 'fuzzy') {
        return `
          <section class="card">
            <div class="card-head"><div><div class="kicker">RESULT · POSSIBLY RELATED</div><h3>未精确命中 · 以下可能相关</h3></div><span class="badge warn">需人工判断</span></div>
            <div class="card-pad" style="display:grid;gap:10px">
              <p class="muted" style="margin:0 0 2px;font-size:12px">按重合度排序,仅供参考,勿直接照搬其方案。</p>
              ${r.hits.map(h => `
                <div class="result-block warn" style="display:flex;align-items:center;justify-content:space-between;gap:12px">
                  <div style="min-width:0"><strong style="font-size:13.5px;display:block;line-height:1.4">${escapeHtml(h.title)}</strong><div class="mono muted" style="font-size:11px;margin-top:5px;word-break:break-all">${escapeHtml(h.file)}</div></div>
                  <span class="badge warn mono">重合 ${escapeHtml(typeof h.score === 'number' ? h.score.toFixed(2) : h.score)}</span>
                </div>`).join('')}
            </div>
          </section>`;
      }
      return `
        <section class="card">
          <div class="card-pad">
            <div class="empty">
              ${iconInfo()}
              <div style="font-size:14px;font-weight:650;color:var(--text-dim)">知识库中暂无相关案例</div>
              <div style="font-size:12px;max-width:380px;line-height:1.55">请勿编造解决方案;排查后可在「写入知识」页把本次结论入库,下次即可命中。</div>
            </div>
          </div>
        </section>`;
    }

    function bindEvents() {
      tabIngest.onclick = () => setMode('ingest');
      tabQuery.onclick = () => setMode('query');
      root.querySelectorAll('.step.click').forEach(el => el.onclick = () => setStep(Number(el.dataset.step)));

      const rawInput = document.getElementById('rawInput');
      if (rawInput) rawInput.oninput = e => { state.rawInput = e.target.value; };
      const logText = document.getElementById('logText');
      if (logText) logText.oninput = e => { state.logText = e.target.value; };

      const bind = (id, fn) => { const el = document.getElementById(id); if (el) el.onclick = fn; };
      bind('loadSample', loadSample);
      bind('doPreview', doPreview);
      bind('retryPreview', doPreview);
      bind('backToPaste', () => { state.step = 1; state.parseErr = ''; render(); });
      bind('addSig', () => addList('signatures'));
      bind('addComp', () => addList('components'));
      bind('commit', commit);
      bind('resetIngest', resetIngest);
      bind('goQuery', () => setMode('query'));
      bind('runQuery', runQuery);

      if (state.draft) {
        ['title', 'category', 'ident', 'background', 'diagnosis', 'solution'].forEach(key => {
          const el = document.getElementById(key);
          if (el) el.oninput = e => updateDraft(key, e.target.value);
        });
        root.querySelectorAll('.sig').forEach(el => el.oninput = e => updateList('signatures', Number(e.target.dataset.index), e.target.value));
        root.querySelectorAll('.comp').forEach(el => el.oninput = e => updateList('components', Number(e.target.dataset.index), e.target.value));
        root.querySelectorAll('.del-sig').forEach(el => el.onclick = e => removeList('signatures', Number(e.currentTarget.dataset.index)));
        root.querySelectorAll('.del-comp').forEach(el => el.onclick = e => removeList('components', Number(e.currentTarget.dataset.index)));
      }
    }

    function render() {
      root.innerHTML = `
        <div class="grid">
          ${renderRail()}
          <div class="main">${state.mode === 'ingest' ? renderIngestMain() : renderQueryMain()}</div>
        </div>`;
      bindEvents();
    }

    render();
    refreshMeta();
  </script>
</body>
</html>
